version: "3.9"

services:
  flask-app:
    build: .
    container_name: flask_app
    ports:
      - "5002:5000"

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - flask-app
